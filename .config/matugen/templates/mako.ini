# ==============================================================================
# MAKO CONFIGURATION: MATUGEN TEMPLATE ARCHITECTURE
# DESTINATION FOR FINAL: ~/.config/mako/config
# PRE-PROCESSOR: Matugen 4.0+
# ==============================================================================

# ==============================================================================
# 1. GLOBAL GEOMETRY & PLACEMENT
# ==============================================================================
# output=eDP-1
layer=overlay
anchor=bottom-left
width=340
height=150
outer-margin=0,0,15,5
margin=5
padding=10
border-size=1
border-radius=10

# ==============================================================================
# 2. TYPOGRAPHY & ICONS
# ==============================================================================
font=JetBrainsMono Nerd Font Mono 11
markup=1
format=<b>%s</b>\n%b
icons=1
max-icon-size=30
icon-border-radius=8
icon-path=/usr/share/icons/Papirus-Dark:/usr/share/icons/Papirus-Light:/usr/share/icons/Papirus:/usr/share/icons/breeze-dark:/usr/share/icons/breeze:/usr/share/icons/Adwaita:/usr/share/icons/AdwaitaLegacy:/usr/share/icons/hicolor

# ==============================================================================
# 3. TIMEOUTS, HISTORY, BEHAVIOR & ACTIONS
# ==============================================================================
default-timeout=5000
ignore-timeout=0
max-visible=6
max-history=99
history=1
sort=-time
actions=1
on-button-left=invoke-default-action
on-button-right=dismiss

# ==============================================================================
# 4. GLOBAL MATUGEN COLOR INJECTION (BASE THEME)
# ==============================================================================
# TUI NOTE: To hardcode a color, replace the matugen variable with a hex code.
# NOTE ON MATUGEN SYNTAX: Material Design 3 roles MUST use snake_case!
background-color={{colors.surface.default.hex}}80
text-color={{colors.on_surface.default.hex}}
border-color={{colors.outline.default.hex}}ff
progress-color={{colors.primary_container.default.hex}}ff

# ==============================================================================
# 5. STATE MODES (Cascading Overrides)
# ==============================================================================
[mode=do-not-disturb]
invisible=1
on-notify=none

[mode=silent]
on-notify=none

# ==============================================================================
# 6. URGENCY LEVELS
# ==============================================================================
[urgency=low]
default-timeout=2000
# OVERRIDES
# background-color={{colors.surface.default.hex}}e6
# text-color={{colors.on_surface.default.hex}}
# border-color={{colors.outline_variant.default.hex}}

[urgency=normal]
default-timeout=3000

[urgency=critical]
invisible=0
default-timeout=3500
ignore-timeout=1
on-notify=exec $HOME/user_scripts/waybar/safe_pkill.sh
# OVERRIDES
background-color={{colors.error_container.default.hex}}e6
text-color={{colors.on_error_container.default.hex}}
border-color={{colors.error.default.hex}}

# ==============================================================================
# 7. APPLICATION OVERRIDES
# ==============================================================================
[app-name=Spotify]
invisible=1

[app-name=OSD]
anchor=bottom-center
layer=overlay
width=242
height=48
outer-margin=0,0,0,0
margin=0
padding=0
border-size=0
border-radius=24
icons=1
text-alignment=center
default-timeout=1000
on-button-left=invoke-default-action
# OVERRIDES
background-color={{colors.surface.default.hex}}50
text-color={{colors.on_surface.default.hex}}ff
border-color={{colors.outline.default.hex}}33

[app-name=matugen-theme]
anchor=bottom-center
layer=overlay
width=160
outer-margin=0,0,0,0
margin=0,0,60,0
padding=10
border-size=0
border-radius=20
icons=0
text-alignment=center
format=<span font="monospace 16">%b</span>
default-timeout=2500
on-button-left=invoke-default-action
# OVERRIDES
background-color={{colors.surface_container_highest.default.hex}}e6
text-color={{colors.on_surface.default.hex}}ff
border-color={{colors.outline.default.hex}}cc
