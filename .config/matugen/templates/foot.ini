font=CommitMono:size=11
[cursor]
style=beam
blink=yes
beam-thickness=1.5

[colors-dark]
foreground={{colors.on_surface.default.hex_stripped}}
background={{colors.surface.default.hex_stripped}}
selection-foreground={{colors.on_primary.default.hex_stripped}}
selection-background={{colors.primary.default.hex_stripped}}
jump-labels={{colors.surface.default.hex_stripped}} {{colors.tertiary.default.hex_stripped}}
urls={{colors.primary.default.hex_stripped}}
alpha=0.85

regular0={{colors.shadow.default.hex_stripped}}
regular1={{colors.error.default.hex_stripped}}
regular2={{colors.secondary.default.hex_stripped}}
regular3={{colors.tertiary.default.hex_stripped}}
regular4={{colors.primary.default.hex_stripped}}
regular5={{colors.secondary_fixed.default.hex_stripped}}
regular6={{colors.primary_fixed.default.hex_stripped}}
regular7={{colors.on_surface.default.hex_stripped}}

bright0={{colors.surface_variant.default.hex_stripped}}
bright1={{colors.error.default.hex_stripped}}
bright2={{colors.secondary.default.hex_stripped}}
bright3={{colors.tertiary.default.hex_stripped}}
bright4={{colors.primary.default.hex_stripped}}
bright5={{colors.secondary_fixed.default.hex_stripped}}
bright6={{colors.primary_fixed.default.hex_stripped}}
bright7={{colors.on_surface_variant.default.hex_stripped}}

dim0={{colors.surface_container.default.hex_stripped}}
dim1={{colors.error_container.default.hex_stripped}}
dim2={{colors.secondary_container.default.hex_stripped}}
dim3={{colors.tertiary_container.default.hex_stripped}}
dim4={{colors.primary_container.default.hex_stripped}}
dim5={{colors.secondary_fixed_dim.default.hex_stripped}}
dim6={{colors.primary_fixed_dim.default.hex_stripped}}
dim7={{colors.outline.default.hex_stripped}}

[csd]
preferred=none

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+f
font-increase=Control+equal
font-decrease=Control+minus
font-reset=Control+0
spawn-terminal=Control+Shift+Return
