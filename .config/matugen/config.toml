[config]
reload_apps = true
reload_apps_list = ["waybar", "dunst"]

[templates.waybar]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/waybar/colors.css"

[templates.fuzzel]
input_path = "~/.config/matugen/templates/fuzzel.ini"
output_path = "~/.config/fuzzel/colors.ini"

[templates.niri]
input_path = "~/.config/matugen/templates/niri-colors.kdl"
output_path = "~/.config/niri/colors.kdl"

[templates.mako]
input_path = "~/.config/matugen/templates/mako.ini"
output_path = "~/.config/mako/config"

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/colors.conf"

[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-3.0/colors.css"
post_hook = 'bash ~/.config/matugen/post-hook-scripts/gtk-themes-reload.sh'

[templates.gtk4]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-4.0/colors.css"

[templates.rofi]
input_path = "~/.config/matugen/templates/rofi-colors.rasi"
output_path = "~/.config/rofi/config.rasi"

[templates.yazi]
input_path = "~/.config/matugen/templates/yazi-theme.toml"
output_path = "~/.config/yazi/theme.toml"

[templates.starship]
input_path = "~/.config/matugen/templates/starship-colors.toml"
output_path = "~/.config/starship.toml"

[templates.helix]
input_path = "~/.config/matugen/templates/helix.toml"
output_path = "~/.config/helix/themes/colors.toml"

[templates.spicetify]
input_path = "~/.config/matugen/templates/spicetify.ini"
output_path = "~/.config/spicetify/Themes/Comfy/color.ini"

[templates.discord]
input_path = "~/.config/matugen/templates/midnight-discord.css"
output_path = "~/.config/Vencord/themes/midnight-discord.css"

[templates.btop]
input_path = "~/.config/matugen/templates/btop.theme"
output_path = "~/.config/btop/themes/btop.theme"

[templates.cava]
input_path = "~/.config/matugen/templates/cava-colors.ini"
output_path = "~/.config/cava/themes/material"

[templates.kvantum_config]
input_path = "~/.config/matugen/templates/kvantum-colors.kvconfig"
output_path = "~/.config/Kvantum/MatugenTheme/MatugenTheme.kvconfig"

[templates.kvantum_svg]
input_path = "~/.config/matugen/templates/kvantum-colors.svg"
output_path = "~/.config/Kvantum/MatugenTheme/MatugenTheme.svg"

[templates.qt5ct]
input_path = "~/.config/matugen/templates/qtct-colors.conf"
output_path = "~/.config/qt5ct/colors/matugen.conf"

[templates.qt6ct]
input_path = "~/.config/matugen/templates/qtct-colors.conf"
output_path = "~/.config/qt6ct/colors/matugen.conf"

[templates.millennium]
input_path = "~/.config/matugen/templates/steam.css"
output_path = "~/.steam/steam/steamui/skins/Material-Theme/css/main/colors/matugen.css"

[templates.mangohud]
input_path = "~/.config/matugen/templates/MangoHud.conf"
output_path = "~/.config/MangoHud/MangoHud.conf"

[templates.fastfetch]
input_path = "~/.config/matugen/templates/fastfetch.jsonc"
output_path = "~/.config/fastfetch/config.jsonc"

[templates.mangowm]
input_path = "~/.config/matugen/templates/mango.conf"
output_path = "~/.config/mango/theme.conf"

[templates.foot]
input_path = "~/.config/matugen/templates/foot.ini"
output_path = "~/.config/foot/foot.ini"

[templates.prismlauncher]
input_path = "~/.config/matugen/templates/prismlauncher.json"
output_path = "~/.local/share/ElyPrismLauncher/themes/matugentheme.json"
