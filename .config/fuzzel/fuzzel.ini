[main]
font=CommitMono:size=13:weight=bold
icon-theme=Papirus-Dark
icons-enabled=yes
prompt="❯   "
placeholder="Search..."
lines=8
width=45
horizontal-pad=32
vertical-pad=20
inner-pad=14
line-height=26
letter-spacing=0
anchor=center
terminal=foot
layer=overlay
exit-on-keyboard-focus-loss=yes
fields=filename,name,generic
match-mode=fuzzy
sort-result=yes
filter-desktop=yes
dpi-aware=yes
image-size-ratio=0.55

include=~/.config/fuzzel/colors.ini

[border]
radius=18
width=2

[dmenu]
mode=text
exit-immediately-if-empty=yes

[key-bindings]
cancel=Escape Control+g Control+c
execute=Return KP_Enter Control+y
execute-or-next=Tab
cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e
delete-prev=BackSpace Control+h
delete-prev-word=Mod1+BackSpace Control+w
delete-next=Delete Control+d
delete-next-word=Mod1+d Control+Delete
prev=Up Control+p
next=Down Control+n
