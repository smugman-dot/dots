# vim:ft=kitty

## name:     Noctalia Shell Default
## author:   Edited for Walid because aesthetics must be obeyed
## blurb:    Dark purple + lavender accents matching Noctalia Shell

# -------------------------
# Core UI colors
# -------------------------
foreground              #e9e4f0
background              #1c1822

selection_foreground    #1c1822
selection_background    #c7a1d8

# Cursor
cursor                  #c7a1d8
cursor_text_color       #1c1822

# URL underline
url_color               #a984c4

# Borders
active_border_color     #c7a1d8
inactive_border_color   #262130
bell_border_color       #e9899d

# Tabs
active_tab_foreground   #1c1822
active_tab_background   #c7a1d8

inactive_tab_foreground #e9e4f0
inactive_tab_background #262130

tab_bar_background      #120f18

# -------------------------
# Terminal 16 colors
# -------------------------

# black / dark surface tones
color0  #120f18
color8  #262130

# red / error rose
color1  #e9899d
color9  #e9899d

# green (soft muted, not neon)
color2  #9bbf9f
color10 #9bbf9f

# yellow (warm accent)
color3  #d8c08a
color11 #d8c08a

# blue (lavender accent)
color4  #a984c4
color12 #c7a1d8

# magenta (primary lavender)
color5  #c7a1d8
color13 #e0b7c9

# cyan (cool outline highlight)
color6  #7aa6b8
color14 #9ccfe0

# white / text shades
color7  #e9e4f0
color15 #ffffff

# -------------------------
# Effects
# -------------------------
background_opacity 0.5
background_blur 1

